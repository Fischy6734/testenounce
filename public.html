<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Latest Announcement</title>
  <style>
    body {font-family:Arial,sans-serif;margin:2rem;}
    #ann {font-size:1.2rem;color:#0066cc;}
  </style>
</head>
<body>
  <h1>📣 Latest Announcement</h1>
  <div id="ann">Loading…</div>

  <script>
    // -----------------------------------------------------------------
    // 1️⃣ Fetch the file that the workflow updates (ANNOUNCEMENT.md)
    // -----------------------------------------------------------------
    async function loadAnnouncement() {
      const resp = await fetch('ANNOUNCEMENT.md');
      if (!resp.ok) {
        document.getElementById('ann').textContent = 'No announcement yet.';
        return;
      }
      const txt = await resp.text();
      // Assume the file starts with a heading, then the actual message.
      const message = txt.replace(/^# Latest Announcement\s*\n/, '').trim();
      document.getElementById('ann').textContent = message;
    }

    // Run on page load and also every 30 seconds (optional live refresh)
    loadAnnouncement();
    setInterval(loadAnnouncement, 30_000);
  </script>
</body>
</html>
