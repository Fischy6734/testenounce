
# This workflow is started by the `repository_dispatch` event we sent from admin.html
on:
  repository_dispatch:
    types: [create_announcement]   # matches the `event_type` we sent above

jobs:
  make-announcement:
    runs-on: ubuntu-latest
    permissions:
      # Needed to create a discussion      issues: write
      # Needed to read repo contents (for the next step)
      contents: read

    steps:
      # -------------------------------------------------------------
      # 1️⃣ Grab the payload that the admin sent
      # -------------------------------------------------------------
      - name: Extract announcement payload
        id: payload        run: |
          echo "payload=$(jq -r .client_payload.announcement)" >> $GITHUB_OUTPUT

      # -------------------------------------------------------------
      # 2️⃣ Create a new discussion in the "Announcements" category
      # -------------------------------------------------------------      - name: Create discussion
        env:
          ANNOUNCEMENT: ${{ steps.payload.outputs.payload }}
        run: |
          gh discussion create "📢 New Announcement" \
            --body "$ANNOUNCEMENT" \
            --category "Announcements" \
            --visibility "public"

      # -------------------------------------------------------------
      # 3️⃣ (Optional) Update a file so that the public page can read it
      # -------------------------------------------------------------
      # This step writes the announcement to a file that the public page      # can fetch directly – no extra server required.
      - name: Write announcement file
        env:
          ANNOUNCEMENT: ${{ steps.payload.outputs.payload }}
        run: |
          echo "# Latest Announcement" > ANNNOUNCEMENT.md
          echo "" >> ANNNOUNCEMENT.md
          echo "$ANNOUNCEMENT" >> ANNNOUNCEMENT.md
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ANNNOUNCEMENT.md
          git commit -m "Add new announcement"
          git push
